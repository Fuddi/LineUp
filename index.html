<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0d0f14" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LineUp" />
  <title>LineUp</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet" />
  <style>
    /* ── CSS Variables ─────────────────────────────────────── */
    :root {
      --color-bg:            #0d0f14;
      --color-surface:       #161b24;
      --color-surface-alt:   #1e2535;
      --color-border:        #2a3347;
      --color-accent:        #00e5ff;
      --color-success:       #00c853;
      --color-danger:        #ff3d00;
      --color-text-primary:  #f0f4ff;
      --color-text-secondary:#8899bb;
      --color-text-disabled: #445577;
      --color-on-accent:     #0d0f14;

      --space-1:  4px;
      --space-2:  8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;

      --radius-sm:    6px;
      --radius-md:   12px;
      --radius-full: 9999px;

      --font-mono: 'Roboto Mono', 'Courier New', monospace;
      --font-sans: 'Inter', system-ui, sans-serif;
    }

    .theme-light {
      --color-bg:           #eef1f6;
      --color-surface:      #f8fafc;
      --color-surface-alt:  #e4e9f2;
      --color-border:       #bec9de;
      --color-accent:       #0070c4;
      --color-success:      #00882a;
      --color-danger:       #cc2e00;
      --color-text-primary: #0e1724;
      --color-text-secondary:#48587a;
      --color-text-disabled: #8fa0bb;
      --color-on-accent:    #ffffff;
    }

    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-text-primary);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; touch-action: manipulation; }
    input  { font-family: inherit; }
    *:focus-visible { outline: 3px solid var(--color-accent); outline-offset: 2px; }
    *:focus:not(:focus-visible) { outline: none; }

    /* ── App shell ─────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 500px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Header ────────────────────────────────────────────── */
    #header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--space-4);
      height: 44px;
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
    }
    #header-logo { display: flex; align-items: center; gap: var(--space-2); }
    #header-logo svg { color: var(--color-accent); }
    #header-title {
      font-size: 15px; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--color-text-primary);
    }
    #header-title span { color: var(--color-accent); }
    #header-right { display: flex; align-items: center; gap: var(--space-2); }
    #headerBadge {
      font-family: var(--font-mono);
      font-size: 11px; font-weight: 700;
      background: var(--color-surface-alt);
      border-radius: var(--radius-full);
      padding: 2px 10px;
      color: var(--color-text-secondary);
    }
    #btn-settings {
      width: 36px; height: 36px;
      border-radius: var(--radius-full);
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-secondary);
      transition: background 0.2s, color 0.2s;
    }
    #btn-settings:hover, #btn-settings:active {
      background: var(--color-surface-alt);
      color: var(--color-accent);
    }

    /* ── Tab Nav ───────────────────────────────────────────── */
    #tab-nav {
      position: sticky; top: 44px; z-index: 90;
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
      display: flex;
    }
    .tab-btn {
      flex: 1;
      padding: 9px var(--space-4);
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--color-text-secondary);
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn.active { color: var(--color-accent); border-bottom-color: var(--color-accent); }
    .tab-btn:hover:not(.active) { color: var(--color-text-primary); }

    /* ── Main scroll ───────────────────────────────────────── */
    #main-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; scrollbar-gutter: stable; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 2px; }

    /* ── Views ─────────────────────────────────────────────── */
    .view { display: none; padding: 12px; }
    .view.active { display: block; }

    /* ── Typography ────────────────────────────────────────── */
    .section-title { font-size: 15px; font-weight: 700; color: var(--color-text-primary); }
    .section-sub   { font-size: 12px; color: var(--color-text-secondary); margin-top: 1px; }

    /* ── Stack / Row helpers ───────────────────────────────── */
    .stack { display: flex; flex-direction: column; gap: var(--space-2); }
    .row   { display: flex; align-items: center; gap: var(--space-2); }
    .row-between { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-3); }

    /* ── Form input ────────────────────────────────────────── */
    .text-input {
      flex: 1; height: 48px;
      padding: 0 var(--space-4);
      border-radius: var(--radius-md);
      border: 2px solid var(--color-border);
      background: var(--color-surface-alt);
      color: var(--color-text-primary);
      font-size: 16px;
      transition: border-color 0.2s;
    }
    .text-input::placeholder { color: var(--color-text-disabled); }
    .text-input:focus { border-color: var(--color-accent); outline: none; }
    .text-input.error { border-color: var(--color-danger); box-shadow: 0 0 0 3px rgba(255,61,0,0.2); }

    /* ── Buttons ───────────────────────────────────────────── */
    .btn-primary {
      height: 48px; padding: 0 var(--space-8);
      border-radius: var(--radius-full);
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      background: var(--color-accent); color: var(--color-on-accent);
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.96); }
    .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-secondary {
      height: 48px; padding: 0 var(--space-6);
      border-radius: var(--radius-full);
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      background: transparent;
      color: var(--color-text-secondary);
      border: 2px solid var(--color-border);
      transition: border-color 0.2s, color 0.2s, transform 0.1s;
    }
    .btn-secondary:hover, .btn-secondary:active { border-color: var(--color-accent); color: var(--color-accent); }
    .btn-secondary:active { transform: scale(0.96); }
    .btn-secondary.accent { border-color: var(--color-accent); color: var(--color-accent); }

    .btn-small {
      height: 30px; padding: 0 var(--space-3);
      border-radius: var(--radius-full);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      border: 1px solid var(--color-border);
      color: var(--color-text-secondary);
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      flex-shrink: 0;
    }
    .btn-small:hover { border-color: var(--color-accent); color: var(--color-accent); }
    .btn-small.accent { border-color: var(--color-accent); color: var(--color-accent); }
    .btn-small.accent:hover { background: rgba(0,229,255,0.08); }

    .btn-icon {
      width: 36px; height: 36px;
      border-radius: var(--radius-full);
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-secondary);
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    .btn-icon:hover, .btn-icon:active { background: var(--color-surface-alt); }
    .btn-icon.danger:hover { color: var(--color-danger); }

    /* ── Player card (Roster) ──────────────────────────────── */
    .player-card {
      background: var(--color-surface);
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-3) var(--space-3) var(--space-3) 0;
      overflow: hidden;
      animation: cardIn 0.2s ease both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .player-card-accent { width: 4px; align-self: stretch; flex-shrink: 0; background: var(--color-accent); }
    .player-bib {
      font-family: var(--font-mono);
      font-size: 11px; font-weight: 700;
      color: var(--color-text-secondary);
      background: var(--color-surface-alt);
      border-radius: var(--radius-sm);
      padding: 3px 6px; min-width: 32px; text-align: center;
      flex-shrink: 0;
    }
    .player-name {
      flex: 1; font-size: 15px; font-weight: 500;
      color: var(--color-text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Level segment control (Roster) ────────────────────── */
    .player-level {
      display: flex; gap: 2px; flex-shrink: 0;
      background: var(--color-surface-alt);
      border-radius: var(--radius-sm);
      padding: 2px;
      border: 1px solid var(--color-border);
    }
    .level-seg {
      width: 22px; height: 22px;
      border-radius: 4px;
      font-family: var(--font-mono); font-size: 10px; font-weight: 700;
      color: var(--color-text-secondary);
      background: transparent;
      transition: color .15s, background .15s;
    }
    .level-seg:hover:not(.active) { color: var(--color-text-primary); }
    .level-seg.active { color: var(--color-on-accent); }
    .level-seg.active.lv-A { background: #ffb300; }
    .level-seg.active.lv-B { background: #00e5ff; }
    .level-seg.active.lv-C { background: #c066ff; }

    /* ── Level badge (Teams + Today) ───────────────────────── */
    .lv-badge {
      font-family: var(--font-mono); font-size: 10px; font-weight: 700;
      border-radius: 4px;
      padding: 2px 5px; min-width: 18px; text-align: center;
      flex-shrink: 0;
      border: 1px solid transparent;
    }
    .lv-badge.lv-A { color: #ffb300; background: rgba(255,179,0,0.12); border-color: rgba(255,179,0,0.35); }
    .lv-badge.lv-B { color: #00e5ff; background: rgba(0,229,255,0.10); border-color: rgba(0,229,255,0.30); }
    .lv-badge.lv-C { color: #c066ff; background: rgba(192,102,255,0.12); border-color: rgba(192,102,255,0.35); }

    /* Corner level mark for select-btn */
    .sel-level {
      position: absolute; top: 6px; left: 8px;
      font-family: var(--font-mono); font-size: 10px; font-weight: 700;
      letter-spacing: 0.05em;
    }
    .sel-level.lv-A { color: #ffb300; }
    .sel-level.lv-B { color: #00e5ff; }
    .sel-level.lv-C { color: #c066ff; }

    /* ── Select grid ───────────────────────────────────────── */
    #selectGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-2);
    }
    @media (min-width: 400px) { #selectGrid { grid-template-columns: 1fr 1fr 1fr; } }

    .select-btn {
      position: relative;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px; padding: 10px var(--space-2);
      min-height: 72px;
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text-secondary);
      font-size: 13px; font-weight: 500;
      transition: border-color 0.15s, background 0.15s, color 0.15s, transform 0.1s;
    }
    .select-btn:active { transform: scale(0.96); }
    .select-btn:hover:not(.selected) { border-color: var(--color-text-secondary); color: var(--color-text-primary); }
    .select-btn.selected { border-color: var(--color-accent); background: rgba(0,229,255,0.07); color: var(--color-text-primary); }
    .sel-initials {
      width: 32px; height: 32px;
      border-radius: var(--radius-full);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono); font-size: 11px; font-weight: 700;
      background: var(--color-surface-alt); color: var(--color-text-secondary);
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .select-btn.selected .sel-initials { background: var(--color-accent); color: var(--color-on-accent); }
    .sel-name { font-size: 12px; text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 4px; }
    .sel-check { position: absolute; top: 6px; right: 8px; font-size: 10px; font-weight: 900; color: var(--color-accent); }

    /* ── Team zones ────────────────────────────────────────── */
    .team-zone {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: border-color 0.15s, background 0.15s;
    }
    .team-zone.drag-over { border-color: var(--color-accent) !important; background: rgba(0,229,255,0.04) !important; }
    .team-zone-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-3) var(--space-4);
      background: var(--team-color, var(--color-accent));
    }
    .team-zone-label {
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: #0d0f14;
    }
    .team-zone-count {
      font-family: var(--font-mono); font-size: 12px; font-weight: 700;
      color: rgba(13,15,20,0.65);
      background: rgba(255,255,255,0.25);
      border-radius: var(--radius-full); padding: 2px 10px;
    }
    .team-zone-list { list-style: none; padding: var(--space-3); display: flex; flex-direction: column; gap: var(--space-2); min-height: 56px; }

    /* ── Player item (Teams) ───────────────────────────────── */
    .player-item {
      background: var(--color-surface-alt);
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-2) var(--space-3) var(--space-2) 0;
      overflow: hidden;
      cursor: grab; touch-action: none; user-select: none;
      transition: opacity 0.15s, transform 0.15s;
    }
    .player-item:active { cursor: grabbing; }
    .player-item.dragging { opacity: 0.3; transform: scale(0.97); }
    .pi-accent { width: 3px; align-self: stretch; flex-shrink: 0; background: var(--team-color, var(--color-accent)); }
    .pi-handle { color: var(--color-text-disabled); display: flex; align-items: center; flex-shrink: 0; }
    .pi-num {
      font-family: var(--font-mono); font-size: 11px; font-weight: 700;
      color: var(--color-text-secondary);
      background: var(--color-surface);
      border-radius: var(--radius-sm); padding: 2px 6px; min-width: 26px; text-align: center;
      flex-shrink: 0;
    }
    .pi-name { flex: 1; font-size: 15px; font-weight: 500; color: var(--color-text-primary); }

    /* ── Drag ghost ────────────────────────────────────────── */
    .drag-ghost {
      position: fixed; pointer-events: none; z-index: 9999;
      opacity: 0.92; border-radius: var(--radius-sm);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      transform: scale(1.04) rotate(1deg);
      transition: none;
    }

    /* ── Fixed Start Game bar ──────────────────────────────── */
    #startBar {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: var(--color-bg);
      border-top: 1px solid var(--color-border);
      padding: var(--space-2) var(--space-4);
      padding-bottom: calc(var(--space-2) + env(safe-area-inset-bottom, 0px));
    }
    #startBar.visible { display: block; }
    #startBar-inner { max-width: 500px; margin: 0 auto; }
    #startBtn {
      width: 100%; height: 44px;
      border-radius: var(--radius-full);
      font-size: 14px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      background: var(--color-accent); color: var(--color-on-accent);
      transition: opacity 0.2s, transform 0.1s;
    }
    #startBtn:active { transform: scale(0.98); }
    #startBtn:disabled { opacity: 0.3; cursor: not-allowed; }
    #startBtn.glow { animation: pulseGlow 2s ease-in-out infinite; }

    /* ── Empty state ───────────────────────────────────────── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      padding: var(--space-8) var(--space-4); gap: var(--space-3);
      color: var(--color-text-disabled); text-align: center;
    }
    .empty-state strong { color: var(--color-text-secondary); font-size: 15px; display: block; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* ── Settings Drawer ───────────────────────────────────── */
    #settings-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      backdrop-filter: blur(2px);
    }
    #settings-overlay.open { display: block; }
    #settings-drawer {
      position: fixed; top: 0; right: -320px;
      width: 300px; max-width: 85vw; height: 100dvh;
      background: var(--color-surface);
      border-left: 1px solid var(--color-border);
      z-index: 201;
      display: flex; flex-direction: column;
      transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto;
    }
    #settings-drawer.open { right: 0; }
    #settings-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-4);
      border-bottom: 1px solid var(--color-border);
      position: sticky; top: 0;
      background: var(--color-surface);
    }
    #settings-header h2 {
      font-size: 15px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--color-text-primary);
    }
    #btn-close-settings {
      width: 36px; height: 36px;
      border-radius: var(--radius-full);
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-secondary);
      transition: background 0.2s, color 0.2s;
    }
    #btn-close-settings:hover { background: var(--color-surface-alt); color: var(--color-text-primary); }
    #settings-body { padding: var(--space-4); display: flex; flex-direction: column; gap: var(--space-4); }
    .setting-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: var(--space-3);
    }
    .setting-label { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
    .setting-sub { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
    .toggle {
      position: relative;
      width: 48px; height: 28px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: var(--color-border);
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: background 0.25s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      left: 3px; top: 3px;
      width: 22px; height: 22px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.25s;
    }
    .toggle input:checked + .toggle-slider { background: var(--color-accent); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }
    .settings-divider { height: 1px; background: var(--color-border); }
    .stepper { display: flex; align-items: center; gap: var(--space-2); flex-shrink: 0; }
    .stepper-btn {
      width: 32px; height: 32px;
      border-radius: var(--radius-full);
      border: 1px solid var(--color-border);
      background: var(--color-surface-alt);
      color: var(--color-text-primary);
      font-size: 18px; font-weight: 700; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .stepper-btn:hover:not(:disabled) { border-color: var(--color-accent); color: var(--color-accent); }
    .stepper-btn:active:not(:disabled) { transform: scale(0.92); }
    .stepper-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .stepper-val {
      font-family: var(--font-mono); font-size: 16px; font-weight: 700;
      color: var(--color-text-primary);
      min-width: 24px; text-align: center;
    }
    .btn-danger-full {
      width: 100%; height: 44px;
      border-radius: var(--radius-md);
      background: rgba(255,61,0,0.1);
      border: 2px solid var(--color-danger);
      color: var(--color-danger);
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-danger-full:active { background: rgba(255,61,0,0.2); transform: scale(0.98); }

    /* ── Animations ────────────────────────────────────────── */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,229,255,0.4); }
      50%       { box-shadow: 0 0 20px 6px rgba(0,229,255,0.12); }
    }
    .anim-a { animation: slideUp 0.3s ease-out both; }
    .anim-b { animation: slideUp 0.3s ease-out 0.1s both; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ═══════════ HEADER ═══════════ -->
  <header id="header">
    <div id="header-logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 2 L9.5 7 L12 12 L14.5 7 Z M2 12 L7 9.5 L12 12 L7 14.5 Z M22 12 L17 9.5 L12 12 L17 14.5 Z M12 22 L9.5 17 L12 12 L14.5 17 Z"/>
      </svg>
      <span id="header-title">Line<span>Up</span></span>
    </div>
    <div id="header-right">
      <span id="headerBadge">0 players</span>
      <button id="btn-settings" aria-label="Open settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ═══════════ TAB NAV ═══════════ -->
  <nav id="tab-nav">
    <button id="tab-roster" class="tab-btn active" onclick="goTo('roster')">Roster</button>
    <button id="tab-select" class="tab-btn"        onclick="goTo('select')">Today</button>
    <button id="tab-teams"  class="tab-btn"        onclick="goTo('teams')">Teams</button>
  </nav>

  <!-- ═══════════ MAIN ═══════════ -->
  <main id="main-scroll">

    <!-- ─── ROSTER ─── -->
    <div id="view-roster" class="view active" style="padding-bottom: var(--space-8);">
      <div class="stack">

        <form id="addForm" class="row">
          <input id="nameInput" type="text" class="text-input"
            placeholder="Enter player name…" autocomplete="off" spellcheck="false" maxlength="40" />
          <button type="submit" class="btn-primary">Add</button>
        </form>

        <div id="rosterList" class="stack" style="gap: var(--space-2);"></div>

        <div id="rosterEmpty" class="empty-state" style="display:none;">
          <strong>No players yet</strong>
          <p>Add names above to build your squad.</p>
        </div>

      </div>
    </div>

    <!-- ─── TODAY / SELECT ─── -->
    <div id="view-select" class="view" style="padding-bottom: 68px;">
      <div class="stack">

        <div class="row-between" style="align-items:center;">
          <span id="selectInfo" class="section-sub" style="margin:0;"></span>
          <div class="row" style="flex-shrink:0;">
            <button class="btn-small accent" onclick="doSelectAll()">All</button>
            <button class="btn-small"        onclick="doClearAll()">Clear</button>
          </div>
        </div>

        <div id="selectGrid"></div>

        <div id="selectEmpty" class="empty-state" style="display:none;">
          <strong>Roster is empty</strong>
          <p>Add players in the Roster tab first.</p>
          <button class="btn-secondary" style="margin-top: var(--space-2);" onclick="goTo('roster')">Go to Roster</button>
        </div>

      </div>
    </div>

    <!-- ─── TEAMS ─── -->
    <div id="view-teams" class="view" style="padding-bottom: var(--space-8);">
      <div class="stack">

        <div id="teamsHeader" style="display:none;">
          <div id="teamsInfo" class="section-sub"></div>
        </div>

        <div id="teamsGrid" class="stack"></div>

        <div id="teamsActions" class="stack" style="display:none;">
          <button class="btn-secondary" style="width:100%; height:44px;" onclick="doReshuffle()">Reshuffle Teams</button>
          <button class="btn-secondary accent" style="width:100%; height:44px;" onclick="goTo('select')">← Change Players</button>
        </div>

        <div id="teamsEmpty" class="empty-state">
          <strong>No teams yet</strong>
          <p>Go to Today, select your players,<br>and hit Start Game.</p>
          <button class="btn-secondary" style="margin-top: var(--space-2);" onclick="goTo('select')">Select Players</button>
        </div>

      </div>
    </div>

  </main>

  <!-- ═══════════ START GAME BAR ═══════════ -->
  <div id="startBar">
    <div id="startBar-inner">
      <button id="startBtn" disabled onclick="doStartGame()">Start Game</button>
    </div>
  </div>

  <!-- ═══════════ SETTINGS DRAWER ═══════════ -->
  <div id="settings-overlay" role="dialog" aria-modal="true" aria-label="Settings"></div>
  <div id="settings-drawer">
    <div id="settings-header">
      <h2>Settings</h2>
      <button id="btn-close-settings" aria-label="Close settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="settings-body">

      <div class="setting-row">
        <div>
          <div class="setting-label">Light Mode</div>
          <div class="setting-sub">Switch to light theme</div>
        </div>
        <label class="toggle" aria-label="Toggle light mode">
          <input type="checkbox" id="toggle-light-mode" />
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="settings-divider"></div>

      <div class="setting-row">
        <div>
          <div class="setting-label">Max per team</div>
          <div class="setting-sub">E.g. 18 selected &amp; max 6 = 3 teams</div>
        </div>
        <div class="stepper" aria-label="Max players per team">
          <button id="maxPerTeamDec" class="stepper-btn" aria-label="Decrease">−</button>
          <span id="maxPerTeamValue" class="stepper-val">6</span>
          <button id="maxPerTeamInc" class="stepper-btn" aria-label="Increase">+</button>
        </div>
      </div>

      <div class="settings-divider"></div>

      <button id="btn-fullscreen" class="btn-secondary" style="width:100%; height:44px; font-size:13px;">
        Fullscreen Mode
      </button>

      <div class="settings-divider"></div>

      <button id="btn-reset-session" class="btn-danger-full">
        Clear All &amp; Reset
      </button>

    </div>
  </div>

</div><!-- #app -->

<!-- ═══════════ SCRIPT ═══════════ -->
<script>
  // ─────────── State ───────────
  let players  = [];
  let selected = new Set();
  let teams    = [];
  let teamsGenerated = false;

  // ─────────── Default squad (Lyngby HK U11 drenge) ───────────
  const DEFAULT_PLAYERS = [
    "Adian Kamenica","Aksel Strange","Alvin Breau","Anker Glahn",
    "Arn Grønbjerg Vej-Hansen","Aske Lysbjerg Havndrup","Benjamin Niclasen",
    "Bertram Boysen","Buster Brammer Boldt","Carl Krogh Samsøe",
    "Conrad Juul Coffari","Daniel Nazari","Demir Yigit","Edward Nielsen",
    "Ernst Munch-Petersen","Frederik Stegenborg","James Petersson",
    "Joachim Thinggaard","Kristian Pihl","Lucas Dønkjær",
    "Malthe Kruse Christiansen","Marcus Wiingaard Alstrup",
    "Marius Engly Anthonsen","Markus Torres Thani","Mathias Petersen",
    "Mihajlo Kruse Dimitrijevic","Nikolaj Lynge","Oscar Lund Costa",
    "Oscar Madsen Bjerre","Oscar Niemann","Storm Lui Dyg Staunæs",
    "Theo Friis Bach","Tobias Balslev Hansen","Victor Hørsted",
    "Viktor Bjørk Thorgrimsen","Walther Hodal","Witek Wojcik"
  ];

  // ─────────── Settings state ───────────
  const MAX_PER_TEAM_MIN = 2;
  const MAX_PER_TEAM_MAX = 15;
  let settings = { darkMode: true, maxPerTeam: 6 };

  function loadSettings() {
    try {
      const raw = localStorage.getItem('lu_settings');
      if (raw) settings = { ...settings, ...JSON.parse(raw) };
    } catch {}
    // Clamp in case of corrupted/out-of-range value
    settings.maxPerTeam = Math.max(
      MAX_PER_TEAM_MIN,
      Math.min(MAX_PER_TEAM_MAX, settings.maxPerTeam | 0 || 6)
    );
  }
  function saveSettings() {
    localStorage.setItem('lu_settings', JSON.stringify(settings));
  }
  function applyTheme() {
    document.body.classList.toggle('theme-light', !settings.darkMode);
    const toggle = document.getElementById('toggle-light-mode');
    if (toggle) toggle.checked = !settings.darkMode;
  }
  function renderMaxPerTeam() {
    const el = document.getElementById('maxPerTeamValue');
    if (el) el.textContent = settings.maxPerTeam;
    const dec = document.getElementById('maxPerTeamDec');
    const inc = document.getElementById('maxPerTeamInc');
    if (dec) dec.disabled = settings.maxPerTeam <= MAX_PER_TEAM_MIN;
    if (inc) inc.disabled = settings.maxPerTeam >= MAX_PER_TEAM_MAX;
  }

  // ─────────── Boot ───────────
  (function init() {
    loadSettings();
    applyTheme();
    const stored = localStorage.getItem('lu_players');
    const raw = stored ? JSON.parse(stored) : DEFAULT_PLAYERS.slice();
    const { list, migrated } = migratePlayers(raw);
    players = list;
    if (!stored || migrated) save();
    renderRoster();
    renderSelect();
    if (players.length > 0) goTo('select');
  })();

  // Convert legacy string entries to {name, level} objects. Default level: 'B'.
  function migratePlayers(raw) {
    let migrated = false;
    const list = raw.map(entry => {
      if (typeof entry === 'string') { migrated = true; return { name: entry, level: 'B' }; }
      if (!entry || typeof entry !== 'object') { migrated = true; return { name: String(entry), level: 'B' }; }
      const level = ['A','B','C'].includes(entry.level) ? entry.level : 'B';
      if (level !== entry.level) migrated = true;
      return { name: String(entry.name ?? ''), level };
    }).filter(p => p.name);
    return { list, migrated };
  }

  // ─────────── Persistence ───────────
  function save() {
    localStorage.setItem('lu_players', JSON.stringify(players));
  }

  // ─────────── Navigation ───────────
  function goTo(view) {
    ['roster', 'select', 'teams'].forEach(v => {
      document.getElementById(`view-${v}`).classList.toggle('active', v === view);
      document.getElementById(`tab-${v}`).classList.toggle('active', v === view);
    });
    document.getElementById('startBar').classList.toggle('visible', view === 'select');
    if (view === 'select') renderSelect();
  }

  // ─────────── Roster ───────────
  function renderRoster() {
    const list  = document.getElementById('rosterList');
    const empty = document.getElementById('rosterEmpty');
    document.getElementById('headerBadge').textContent =
      `${players.length} player${players.length !== 1 ? 's' : ''}`;

    if (players.length === 0) {
      list.innerHTML = '';
      empty.style.display = 'flex';
      return;
    }
    empty.style.display = 'none';

    list.innerHTML = players.map((p, i) => `
      <div class="player-card">
        <div class="player-card-accent"></div>
        <span class="player-bib">${initials(p.name)}</span>
        <span class="player-name">${esc(p.name)}</span>
        <div class="player-level" role="radiogroup" aria-label="Level for ${esc(p.name)}">
          ${['A','B','C'].map(lv => `
            <button type="button" class="level-seg lv-${lv}${p.level === lv ? ' active' : ''}"
              role="radio" aria-checked="${p.level === lv}" aria-label="Level ${lv}"
              onclick="setLevel(${i}, '${lv}')">${lv}</button>
          `).join('')}
        </div>
        <button onclick="removePlayer(${i})" class="btn-icon danger" aria-label="Remove ${esc(p.name)}" style="margin-right: 4px;">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        </button>
      </div>
    `).join('');
  }

  function setLevel(i, level) {
    if (!players[i] || !['A','B','C'].includes(level)) return;
    if (players[i].level === level) return;
    players[i].level = level;
    save();
    renderRoster();
    // Also refresh Today grid so the corner level badge updates
    if (document.getElementById('view-select').classList.contains('active')) renderSelect();
  }

  document.getElementById('addForm').addEventListener('submit', e => {
    e.preventDefault();
    const input = document.getElementById('nameInput');
    const name  = input.value.trim();
    if (!name) return;

    if (players.some(p => p.name.toLowerCase() === name.toLowerCase())) {
      flashError(input);
      return;
    }

    players.push({ name, level: 'B' });
    save();
    renderRoster();
    input.value = '';
    input.focus();
  });

  function removePlayer(i) {
    const p = players[i];
    if (!p) return;
    players.splice(i, 1);
    selected.delete(p.name);
    save();
    renderRoster();
    updateStartBtn();
  }

  // ─────────── Selection ───────────
  function renderSelect() {
    const grid  = document.getElementById('selectGrid');
    const empty = document.getElementById('selectEmpty');

    if (players.length === 0) {
      grid.style.display = 'none';
      empty.style.display = 'flex';
      updateStartBtn();
      return;
    }
    grid.style.display = '';
    empty.style.display = 'none';

    grid.innerHTML = players.map(p => {
      const on = selected.has(p.name);
      return `
        <button data-name="${esc(p.name)}" onclick="togglePlayer(this.dataset.name)"
          class="select-btn${on ? ' selected' : ''}">
          <span class="sel-level lv-${p.level}">${p.level}</span>
          <span class="sel-initials">${initials(p.name)}</span>
          <span class="sel-name">${esc(p.name)}</span>
          ${on ? '<span class="sel-check">✓</span>' : ''}
        </button>
      `;
    }).join('');

    updateStartBtn();
  }

  function togglePlayer(name) {
    selected.has(name) ? selected.delete(name) : selected.add(name);
    renderSelect();
  }

  function doSelectAll() { players.forEach(p => selected.add(p.name)); renderSelect(); }
  function doClearAll()  { selected.clear(); renderSelect(); }

  function updateStartBtn() {
    const n   = selected.size;
    const btn = document.getElementById('startBtn');

    document.getElementById('selectInfo').textContent =
      n === 0 ? 'Tap players to mark them present' :
      n === 1 ? '1 player selected — need at least 2' :
                `${n} players selected`;

    btn.disabled = n < 2;
    btn.textContent = n >= 2 ? `Start Game  ·  ${n} players` : 'Start Game';

    if (n >= 2) btn.classList.add('glow');
    else        btn.classList.remove('glow');
  }

  // ─────────── Game Logic ───────────
  // Each level gets its own colour; every team made from that level wears it.
  const LEVEL_COLORS = { A: '#ffb300', B: '#00e5ff', C: '#c066ff' };

  // Split `pool` (array of {name, level}) into teams **grouped strictly by
  // level**. Within each level we split evenly into ceil(count / maxPerTeam)
  // sub-teams so you get e.g. A-team 1 vs A-team 2, B-team 1 vs B-team 2, …
  function splitIntoTeams(pool) {
    const byLevel = { A: [], B: [], C: [] };
    for (const p of pool) (byLevel[p.level] || byLevel.B).push(p);
    for (const lvl of ['A', 'B', 'C']) shuffle(byLevel[lvl]);

    const out = [];
    for (const level of ['A', 'B', 'C']) {
      const group = byLevel[level];
      if (!group.length) continue;
      const numSubTeams = Math.max(1, Math.ceil(group.length / settings.maxPerTeam));
      const base = Math.floor(group.length / numSubTeams);
      const extras = group.length % numSubTeams;
      let cursor = 0;
      for (let i = 0; i < numSubTeams; i++) {
        const size = base + (i < extras ? 1 : 0);
        out.push(group.slice(cursor, cursor + size));
        cursor += size;
      }
    }
    return out;
  }

  function doStartGame() {
    if (selected.size < 2) return;
    const pool = players.filter(p => selected.has(p.name));
    teams = splitIntoTeams(pool);
    teamsGenerated = true;
    renderTeams(true);
    goTo('teams');
  }

  function doReshuffle() {
    const all = teams.flat();
    teams = splitIntoTeams(all);
    renderTeams(true);
  }

  // A team's colour comes from its dominant level. Mixed teams (after manual
  // drag) fall back to the first player's level or a neutral accent.
  function teamDominantLevel(idx) {
    const t = teams[idx];
    if (!t || !t.length) return null;
    const count = {};
    for (const p of t) count[p.level] = (count[p.level] || 0) + 1;
    return Object.keys(count).sort((a, b) => count[b] - count[a])[0];
  }
  function teamColor(idx) {
    const lvl = teamDominantLevel(idx);
    return LEVEL_COLORS[lvl] || '#00e5ff';
  }
  function teamLabel(idx) {
    const t = teams[idx];
    if (!t || !t.length) return 'Team';
    const lvl = teamDominantLevel(idx);
    // How many teams (including this one) share this dominant level?
    let sameLevelCount = 0, myIndexInLevel = 0;
    for (let i = 0; i < teams.length; i++) {
      if (teamDominantLevel(i) === lvl) {
        if (i === idx) myIndexInLevel = sameLevelCount;
        sameLevelCount++;
      }
    }
    return sameLevelCount > 1
      ? `Team ${lvl}${myIndexInLevel + 1}`
      : `Team ${lvl}`;
  }

  // "A: 3 vs 3 · B: 3 vs 3 · C: 6"  — matchups grouped by level
  function teamsInfoLine() {
    const total = teams.reduce((s, t) => s + t.length, 0);
    const sizesByLevel = { A: [], B: [], C: [] };
    for (let i = 0; i < teams.length; i++) {
      const lvl = teamDominantLevel(i);
      if (lvl) (sizesByLevel[lvl] = sizesByLevel[lvl] || []).push(teams[i].length);
    }
    const parts = [];
    for (const lvl of ['A', 'B', 'C']) {
      const arr = sizesByLevel[lvl];
      if (arr && arr.length) parts.push(`${lvl}: ${arr.join(' vs ')}`);
    }
    return `${total} players · ${parts.join(' · ')}`;
  }

  function renderTeams(animate) {
    document.getElementById('teamsEmpty').style.display   = 'none';
    document.getElementById('teamsHeader').style.display  = 'block';
    document.getElementById('teamsActions').style.display = 'flex';
    document.getElementById('teamsInfo').textContent = teamsInfoLine();

    document.getElementById('teamsGrid').innerHTML = teams.map((list, zi) => {
      const color = teamColor(zi);
      return `
      <div id="zone-${zi}" data-zone="${zi}" class="team-zone${animate ? (zi % 2 === 0 ? ' anim-a' : ' anim-b') : ''}" style="--team-color:${color};">
        <div class="team-zone-header">
          <span class="team-zone-label">${teamLabel(zi)}</span>
          <span class="team-zone-count">${list.length}</span>
        </div>
        <ul id="list-${zi}" class="team-zone-list">
          ${list.map((p, i) => playerItem(p, i, zi)).join('')}
        </ul>
      </div>`;
    }).join('');

    bindDragListeners();
  }

  function playerItem(p, i, teamIdx) {
    return `
      <li class="player-item" data-name="${esc(p.name)}" data-team="${teamIdx}" draggable="true" style="--team-color:${teamColor(teamIdx)};">
        <div class="pi-accent"></div>
        <span class="pi-handle">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <circle cx="5" cy="4" r="1.4"/><circle cx="11" cy="4" r="1.4"/>
            <circle cx="5" cy="8" r="1.4"/><circle cx="11" cy="8" r="1.4"/>
            <circle cx="5" cy="12" r="1.4"/><circle cx="11" cy="12" r="1.4"/>
          </svg>
        </span>
        <span class="pi-num">${i + 1}</span>
        <span class="pi-name">${esc(p.name)}</span>
        <span class="lv-badge lv-${p.level}">${p.level}</span>
      </li>
    `;
  }

  // ─────────── Drag & Drop ───────────
  let dnd = { name: null, from: null, ghost: null, sourceEl: null };

  function bindDragListeners() {
    document.querySelectorAll('.player-item').forEach(el => {
      el.addEventListener('dragstart', onDragStart);
      el.addEventListener('dragend',   onDragEnd);
    });
    document.querySelectorAll('[data-zone]').forEach(z => {
      const zone = z.dataset.zone;
      z.addEventListener('dragover',  e => onDragOver(e, zone));
      z.addEventListener('dragleave', e => onDragLeave(e, zone));
      z.addEventListener('drop',      e => onDrop(e, zone));
    });
    document.querySelectorAll('.player-item').forEach(el => {
      el.addEventListener('touchstart', onTouchStart, { passive: false });
      el.addEventListener('touchmove',  onTouchMove,  { passive: false });
      el.addEventListener('touchend',   onTouchEnd);
    });
  }

  /* Desktop */
  function onDragStart(e) {
    dnd.name     = e.currentTarget.dataset.name;
    dnd.from     = e.currentTarget.dataset.team;
    dnd.sourceEl = e.currentTarget;
    e.dataTransfer.effectAllowed = 'move';
    requestAnimationFrame(() => e.currentTarget.classList.add('dragging'));
  }
  function onDragEnd(e) {
    e.currentTarget.classList.remove('dragging');
    clearHighlights();
  }
  function onDragOver(e, zone) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (zone !== dnd.from) document.getElementById(`zone-${zone}`).classList.add('drag-over');
  }
  function onDragLeave(e, zone) {
    if (!e.currentTarget.contains(e.relatedTarget))
      document.getElementById(`zone-${zone}`).classList.remove('drag-over');
  }
  function onDrop(e, zone) {
    e.preventDefault();
    clearHighlights();
    if (zone === dnd.from || !dnd.name) return;
    movePlayer(dnd.name, dnd.from, zone);
  }

  /* Touch */
  function onTouchStart(e) {
    const li   = e.currentTarget;
    const rect = li.getBoundingClientRect();
    const t    = e.touches[0];
    dnd.name     = li.dataset.name;
    dnd.from     = li.dataset.team;
    dnd.sourceEl = li;
    dnd.offsetX  = t.clientX - rect.left;
    dnd.offsetY  = t.clientY - rect.top;
    const ghost = li.cloneNode(true);
    ghost.className = 'drag-ghost ' + li.className.replace('player-item','');
    ghost.style.width = rect.width + 'px';
    ghost.style.top   = (t.clientY - dnd.offsetY) + 'px';
    ghost.style.left  = (t.clientX - dnd.offsetX) + 'px';
    document.body.appendChild(ghost);
    dnd.ghost = ghost;
    li.classList.add('dragging');
    e.preventDefault();
  }
  function onTouchMove(e) {
    e.preventDefault();
    if (!dnd.ghost) return;
    const t = e.touches[0];
    dnd.ghost.style.top  = (t.clientY - dnd.offsetY) + 'px';
    dnd.ghost.style.left = (t.clientX - dnd.offsetX) + 'px';
    clearHighlights();
    dnd.ghost.style.display = 'none';
    const under = document.elementFromPoint(t.clientX, t.clientY);
    dnd.ghost.style.display = '';
    const zone = under?.closest('[data-zone]');
    if (zone && zone.dataset.zone !== dnd.from) zone.classList.add('drag-over');
  }
  function onTouchEnd(e) {
    if (!dnd.ghost) return;
    dnd.ghost.remove(); dnd.ghost = null;
    dnd.sourceEl?.classList.remove('dragging');
    const t = e.changedTouches[0];
    dnd.sourceEl.style.display = 'none';
    const under = document.elementFromPoint(t.clientX, t.clientY);
    dnd.sourceEl.style.display = '';
    const zone = under?.closest('[data-zone]');
    clearHighlights();
    if (zone && zone.dataset.zone !== dnd.from && dnd.name)
      movePlayer(dnd.name, dnd.from, zone.dataset.zone);
    dnd = { name: null, from: null, ghost: null, sourceEl: null };
  }

  function movePlayer(name, fromTeam, toTeam) {
    const fi = +fromTeam, ti = +toTeam;
    if (!teams[fi] || !teams[ti] || fi === ti) return;
    const idx = teams[fi].findIndex(p => p.name === name);
    if (idx < 0) return;
    const [moved] = teams[fi].splice(idx, 1);
    teams[ti].push(moved);
    renderTeams(false);
  }
  function clearHighlights() {
    document.querySelectorAll('[data-zone].drag-over').forEach(z => z.classList.remove('drag-over'));
  }

  // ─────────── Utilities ───────────
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function initials(name) {
    return name.trim().split(/\s+/).map(w => w[0] || '').join('').toUpperCase().slice(0, 2) || '?';
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function flashError(input) {
    input.classList.add('error');
    input.select();
    setTimeout(() => input.classList.remove('error'), 1800);
  }

  // ─────────── Settings drawer ───────────
  (function wireSettings() {
    const overlay = document.getElementById('settings-overlay');
    const drawer  = document.getElementById('settings-drawer');
    const btnOpen = document.getElementById('btn-settings');
    const btnClose = document.getElementById('btn-close-settings');

    function open()  {
      overlay.classList.add('open');
      drawer.classList.add('open');
      btnClose.focus();
    }
    function close() {
      overlay.classList.remove('open');
      drawer.classList.remove('open');
      btnOpen.focus();
    }

    btnOpen.addEventListener('click', open);
    btnClose.addEventListener('click', close);
    overlay.addEventListener('click', close);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });

    // Light-mode toggle
    document.getElementById('toggle-light-mode').addEventListener('change', () => {
      settings.darkMode = !settings.darkMode;
      saveSettings();
      applyTheme();
    });

    // Max-per-team stepper
    function bumpMaxPerTeam(delta) {
      const next = Math.max(MAX_PER_TEAM_MIN, Math.min(MAX_PER_TEAM_MAX, settings.maxPerTeam + delta));
      if (next === settings.maxPerTeam) return;
      settings.maxPerTeam = next;
      saveSettings();
      renderMaxPerTeam();
      // If teams are already on screen, re-split live so user sees the effect
      if (teamsGenerated && teams.length) {
        teams = splitIntoTeams(teams.flat());
        renderTeams(false);
      }
    }
    document.getElementById('maxPerTeamDec').addEventListener('click', () => bumpMaxPerTeam(-1));
    document.getElementById('maxPerTeamInc').addEventListener('click', () => bumpMaxPerTeam(+1));
    renderMaxPerTeam();

    // Fullscreen
    document.getElementById('btn-fullscreen').addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
      close();
    });

    // Clear All & Reset
    document.getElementById('btn-reset-session').addEventListener('click', () => {
      if (!confirm('Clear all players and reset? This cannot be undone.')) return;
      players = [];
      selected.clear();
      teams = [];
      teamsGenerated = false;
      save();
      renderRoster();
      renderSelect();
      goTo('roster');
      close();
    });

    // Sync the toggle after the DOM has this element
    applyTheme();
  })();
</script>
</body>
</html>
