<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>LineUp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet" />
  <style>
    /* ── CSS Variables ─────────────────────────────────────── */
    :root {
      --color-bg:            #0d0f14;
      --color-surface:       #161b24;
      --color-surface-alt:   #1e2535;
      --color-border:        #2a3347;
      --color-accent:        #00e5ff;
      --color-success:       #00c853;
      --color-danger:        #ff3d00;
      --color-text-primary:  #f0f4ff;
      --color-text-secondary:#8899bb;
      --color-text-disabled: #445577;
      --color-on-accent:     #0d0f14;

      --space-1:  4px;
      --space-2:  8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;

      --radius-sm:    6px;
      --radius-md:   12px;
      --radius-full: 9999px;

      --font-mono: 'Roboto Mono', 'Courier New', monospace;
      --font-sans: 'Inter', system-ui, sans-serif;
    }

    .theme-light {
      --color-bg:           #eef1f6;
      --color-surface:      #f8fafc;
      --color-surface-alt:  #e4e9f2;
      --color-border:       #bec9de;
      --color-accent:       #0070c4;
      --color-success:      #00882a;
      --color-danger:       #cc2e00;
      --color-text-primary: #0e1724;
      --color-text-secondary:#48587a;
      --color-text-disabled: #8fa0bb;
      --color-on-accent:    #ffffff;
    }

    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-text-primary);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; touch-action: manipulation; }
    input  { font-family: inherit; }
    *:focus-visible { outline: 3px solid var(--color-accent); outline-offset: 2px; }
    *:focus:not(:focus-visible) { outline: none; }

    /* ── App shell ─────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 500px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Header ────────────────────────────────────────────── */
    #header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--space-4);
      height: 44px;
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
    }
    #header-logo { display: flex; align-items: center; gap: var(--space-2); }
    #header-logo svg { color: var(--color-accent); }
    #header-title {
      font-size: 15px; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--color-text-primary);
    }
    #header-title span { color: var(--color-accent); }
    #header-right { display: flex; align-items: center; gap: var(--space-2); }
    #headerBadge {
      font-family: var(--font-mono);
      font-size: 11px; font-weight: 700;
      background: var(--color-surface-alt);
      border-radius: var(--radius-full);
      padding: 2px 10px;
      color: var(--color-text-secondary);
    }
    #btn-settings {
      width: 36px; height: 36px;
      border-radius: var(--radius-full);
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-secondary);
      transition: background 0.2s, color 0.2s;
    }
    #btn-settings:hover, #btn-settings:active {
      background: var(--color-surface-alt);
      color: var(--color-accent);
    }

    /* ── Tab Nav ───────────────────────────────────────────── */
    #tab-nav {
      position: sticky; top: 44px; z-index: 90;
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
      display: flex;
    }
    .tab-btn {
      flex: 1;
      padding: 9px var(--space-4);
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--color-text-secondary);
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn.active { color: var(--color-accent); border-bottom-color: var(--color-accent); }
    .tab-btn:hover:not(.active) { color: var(--color-text-primary); }

    /* ── Main scroll ───────────────────────────────────────── */
    #main-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; scrollbar-gutter: stable; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 2px; }

    /* ── Views ─────────────────────────────────────────────── */
    .view { display: none; padding: 12px; }
    .view.active { display: block; }

    /* ── Typography ────────────────────────────────────────── */
    .section-title { font-size: 15px; font-weight: 700; color: var(--color-text-primary); }
    .section-sub   { font-size: 12px; color: var(--color-text-secondary); margin-top: 1px; }

    /* ── Stack / Row helpers ───────────────────────────────── */
    .stack { display: flex; flex-direction: column; gap: var(--space-2); }
    .row   { display: flex; align-items: center; gap: var(--space-2); }
    .row-between { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-3); }

    /* ── Form input ────────────────────────────────────────── */
    .text-input {
      flex: 1; height: 48px;
      padding: 0 var(--space-4);
      border-radius: var(--radius-md);
      border: 2px solid var(--color-border);
      background: var(--color-surface-alt);
      color: var(--color-text-primary);
      font-size: 16px;
      transition: border-color 0.2s;
    }
    .text-input::placeholder { color: var(--color-text-disabled); }
    .text-input:focus { border-color: var(--color-accent); outline: none; }
    .text-input.error { border-color: var(--color-danger); box-shadow: 0 0 0 3px rgba(255,61,0,0.2); }

    /* ── Buttons ───────────────────────────────────────────── */
    .btn-primary {
      height: 48px; padding: 0 var(--space-8);
      border-radius: var(--radius-full);
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      background: var(--color-accent); color: var(--color-on-accent);
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.96); }
    .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-secondary {
      height: 48px; padding: 0 var(--space-6);
      border-radius: var(--radius-full);
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      background: transparent;
      color: var(--color-text-secondary);
      border: 2px solid var(--color-border);
      transition: border-color 0.2s, color 0.2s, transform 0.1s;
    }
    .btn-secondary:hover, .btn-secondary:active { border-color: var(--color-accent); color: var(--color-accent); }
    .btn-secondary:active { transform: scale(0.96); }
    .btn-secondary.accent { border-color: var(--color-accent); color: var(--color-accent); }

    .btn-small {
      height: 30px; padding: 0 var(--space-3);
      border-radius: var(--radius-full);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      border: 1px solid var(--color-border);
      color: var(--color-text-secondary);
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      flex-shrink: 0;
    }
    .btn-small:hover { border-color: var(--color-accent); color: var(--color-accent); }
    .btn-small.accent { border-color: var(--color-accent); color: var(--color-accent); }
    .btn-small.accent:hover { background: rgba(0,229,255,0.08); }

    .btn-icon {
      width: 36px; height: 36px;
      border-radius: var(--radius-full);
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-secondary);
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    .btn-icon:hover, .btn-icon:active { background: var(--color-surface-alt); }
    .btn-icon.danger:hover { color: var(--color-danger); }

    /* ── Player card (Roster) ──────────────────────────────── */
    .player-card {
      background: var(--color-surface);
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-3) var(--space-3) var(--space-3) 0;
      overflow: hidden;
      animation: cardIn 0.2s ease both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .player-card-accent { width: 4px; align-self: stretch; flex-shrink: 0; background: var(--color-accent); }
    .player-bib {
      font-family: var(--font-mono);
      font-size: 11px; font-weight: 700;
      color: var(--color-text-secondary);
      background: var(--color-surface-alt);
      border-radius: var(--radius-sm);
      padding: 3px 6px; min-width: 32px; text-align: center;
      flex-shrink: 0;
    }
    .player-name {
      flex: 1; font-size: 15px; font-weight: 500;
      color: var(--color-text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Select grid ───────────────────────────────────────── */
    #selectGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-2);
    }
    @media (min-width: 400px) { #selectGrid { grid-template-columns: 1fr 1fr 1fr; } }

    .select-btn {
      position: relative;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px; padding: 10px var(--space-2);
      min-height: 72px;
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text-secondary);
      font-size: 13px; font-weight: 500;
      transition: border-color 0.15s, background 0.15s, color 0.15s, transform 0.1s;
    }
    .select-btn:active { transform: scale(0.96); }
    .select-btn:hover:not(.selected) { border-color: var(--color-text-secondary); color: var(--color-text-primary); }
    .select-btn.selected { border-color: var(--color-accent); background: rgba(0,229,255,0.07); color: var(--color-text-primary); }
    .sel-initials {
      width: 32px; height: 32px;
      border-radius: var(--radius-full);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono); font-size: 11px; font-weight: 700;
      background: var(--color-surface-alt); color: var(--color-text-secondary);
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .select-btn.selected .sel-initials { background: var(--color-accent); color: var(--color-on-accent); }
    .sel-name { font-size: 12px; text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 4px; }
    .sel-check { position: absolute; top: 6px; right: 8px; font-size: 10px; font-weight: 900; color: var(--color-accent); }

    /* ── Team zones ────────────────────────────────────────── */
    .team-zone {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: border-color 0.15s, background 0.15s;
    }
    .team-zone.drag-over { border-color: var(--color-accent) !important; background: rgba(0,229,255,0.04) !important; }
    .team-zone-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-3) var(--space-4);
    }
    .team-zone-header-a { background: var(--color-success); }
    .team-zone-header-b { background: var(--color-accent); }
    .team-zone-label {
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: #0d0f14;
    }
    .team-zone-count {
      font-family: var(--font-mono); font-size: 12px; font-weight: 700;
      color: rgba(13,15,20,0.65);
      background: rgba(255,255,255,0.25);
      border-radius: var(--radius-full); padding: 2px 10px;
    }
    .team-zone-list { list-style: none; padding: var(--space-3); display: flex; flex-direction: column; gap: var(--space-2); min-height: 56px; }

    /* ── Player item (Teams) ───────────────────────────────── */
    .player-item {
      background: var(--color-surface-alt);
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-2) var(--space-3) var(--space-2) 0;
      overflow: hidden;
      cursor: grab; touch-action: none; user-select: none;
      transition: opacity 0.15s, transform 0.15s;
    }
    .player-item:active { cursor: grabbing; }
    .player-item.dragging { opacity: 0.3; transform: scale(0.97); }
    .pi-accent-a { width: 3px; align-self: stretch; flex-shrink: 0; background: var(--color-success); }
    .pi-accent-b { width: 3px; align-self: stretch; flex-shrink: 0; background: var(--color-accent); }
    .pi-handle { color: var(--color-text-disabled); display: flex; align-items: center; flex-shrink: 0; }
    .pi-num {
      font-family: var(--font-mono); font-size: 11px; font-weight: 700;
      color: var(--color-text-secondary);
      background: var(--color-surface);
      border-radius: var(--radius-sm); padding: 2px 6px; min-width: 26px; text-align: center;
      flex-shrink: 0;
    }
    .pi-name { flex: 1; font-size: 15px; font-weight: 500; color: var(--color-text-primary); }

    /* ── Drag ghost ────────────────────────────────────────── */
    .drag-ghost {
      position: fixed; pointer-events: none; z-index: 9999;
      opacity: 0.92; border-radius: var(--radius-sm);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      transform: scale(1.04) rotate(1deg);
      transition: none;
    }

    /* ── Fixed Start Game bar ──────────────────────────────── */
    #startBar {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: var(--color-bg);
      border-top: 1px solid var(--color-border);
      padding: var(--space-2) var(--space-4);
      padding-bottom: calc(var(--space-2) + env(safe-area-inset-bottom, 0px));
    }
    #startBar.visible { display: block; }
    #startBar-inner { max-width: 500px; margin: 0 auto; }
    #startBtn {
      width: 100%; height: 44px;
      border-radius: var(--radius-full);
      font-size: 14px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      background: var(--color-accent); color: var(--color-on-accent);
      transition: opacity 0.2s, transform 0.1s;
    }
    #startBtn:active { transform: scale(0.98); }
    #startBtn:disabled { opacity: 0.3; cursor: not-allowed; }
    #startBtn.glow { animation: pulseGlow 2s ease-in-out infinite; }

    /* ── Empty state ───────────────────────────────────────── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      padding: var(--space-8) var(--space-4); gap: var(--space-3);
      color: var(--color-text-disabled); text-align: center;
    }
    .empty-state strong { color: var(--color-text-secondary); font-size: 15px; display: block; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* ── Settings Drawer ───────────────────────────────────── */
    #settings-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      backdrop-filter: blur(2px);
    }
    #settings-overlay.open { display: block; }
    #settings-drawer {
      position: fixed; top: 0; right: -320px;
      width: 300px; max-width: 85vw; height: 100dvh;
      background: var(--color-surface);
      border-left: 1px solid var(--color-border);
      z-index: 201;
      display: flex; flex-direction: column;
      transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto;
    }
    #settings-drawer.open { right: 0; }
    #settings-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-4);
      border-bottom: 1px solid var(--color-border);
      position: sticky; top: 0;
      background: var(--color-surface);
    }
    #settings-header h2 {
      font-size: 15px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--color-text-primary);
    }
    #btn-close-settings {
      width: 36px; height: 36px;
      border-radius: var(--radius-full);
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-secondary);
      transition: background 0.2s, color 0.2s;
    }
    #btn-close-settings:hover { background: var(--color-surface-alt); color: var(--color-text-primary); }
    #settings-body { padding: var(--space-4); display: flex; flex-direction: column; gap: var(--space-4); }
    .setting-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: var(--space-3);
    }
    .setting-label { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
    .setting-sub { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
    .toggle {
      position: relative;
      width: 48px; height: 28px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: var(--color-border);
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: background 0.25s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      left: 3px; top: 3px;
      width: 22px; height: 22px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.25s;
    }
    .toggle input:checked + .toggle-slider { background: var(--color-accent); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }
    .settings-divider { height: 1px; background: var(--color-border); }
    .btn-danger-full {
      width: 100%; height: 44px;
      border-radius: var(--radius-md);
      background: rgba(255,61,0,0.1);
      border: 2px solid var(--color-danger);
      color: var(--color-danger);
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-danger-full:active { background: rgba(255,61,0,0.2); transform: scale(0.98); }

    /* ── Animations ────────────────────────────────────────── */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,229,255,0.4); }
      50%       { box-shadow: 0 0 20px 6px rgba(0,229,255,0.12); }
    }
    .anim-a { animation: slideUp 0.3s ease-out both; }
    .anim-b { animation: slideUp 0.3s ease-out 0.1s both; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ═══════════ HEADER ═══════════ -->
  <header id="header">
    <div id="header-logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 2 L9.5 7 L12 12 L14.5 7 Z M2 12 L7 9.5 L12 12 L7 14.5 Z M22 12 L17 9.5 L12 12 L17 14.5 Z M12 22 L9.5 17 L12 12 L14.5 17 Z"/>
      </svg>
      <span id="header-title">Line<span>Up</span></span>
    </div>
    <div id="header-right">
      <span id="headerBadge">0 players</span>
      <button id="btn-settings" aria-label="Open settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ═══════════ TAB NAV ═══════════ -->
  <nav id="tab-nav">
    <button id="tab-roster" class="tab-btn active" onclick="goTo('roster')">Roster</button>
    <button id="tab-select" class="tab-btn"        onclick="goTo('select')">Today</button>
    <button id="tab-teams"  class="tab-btn"        onclick="goTo('teams')">Teams</button>
  </nav>

  <!-- ═══════════ MAIN ═══════════ -->
  <main id="main-scroll">

    <!-- ─── ROSTER ─── -->
    <div id="view-roster" class="view active" style="padding-bottom: var(--space-8);">
      <div class="stack">

        <form id="addForm" class="row">
          <input id="nameInput" type="text" class="text-input"
            placeholder="Enter player name…" autocomplete="off" spellcheck="false" maxlength="40" />
          <button type="submit" class="btn-primary">Add</button>
        </form>

        <div id="rosterList" class="stack" style="gap: var(--space-2);"></div>

        <div id="rosterEmpty" class="empty-state" style="display:none;">
          <strong>No players yet</strong>
          <p>Add names above to build your squad.</p>
        </div>

      </div>
    </div>

    <!-- ─── TODAY / SELECT ─── -->
    <div id="view-select" class="view" style="padding-bottom: 68px;">
      <div class="stack">

        <div class="row-between" style="align-items:center;">
          <span id="selectInfo" class="section-sub" style="margin:0;"></span>
          <div class="row" style="flex-shrink:0;">
            <button class="btn-small accent" onclick="doSelectAll()">All</button>
            <button class="btn-small"        onclick="doClearAll()">Clear</button>
          </div>
        </div>

        <div id="selectGrid"></div>

        <div id="selectEmpty" class="empty-state" style="display:none;">
          <strong>Roster is empty</strong>
          <p>Add players in the Roster tab first.</p>
          <button class="btn-secondary" style="margin-top: var(--space-2);" onclick="goTo('roster')">Go to Roster</button>
        </div>

      </div>
    </div>

    <!-- ─── TEAMS ─── -->
    <div id="view-teams" class="view" style="padding-bottom: var(--space-8);">
      <div class="stack">

        <div id="teamsHeader" style="display:none;">
          <div id="teamsInfo" class="section-sub"></div>
        </div>

        <div id="teamsGrid" class="stack"></div>

        <div id="teamsActions" class="stack" style="display:none;">
          <button class="btn-secondary" style="width:100%; height:44px;" onclick="doReshuffle()">Reshuffle Teams</button>
          <button class="btn-secondary accent" style="width:100%; height:44px;" onclick="goTo('select')">← Change Players</button>
        </div>

        <div id="teamsEmpty" class="empty-state">
          <strong>No teams yet</strong>
          <p>Go to Today, select your players,<br>and hit Start Game.</p>
          <button class="btn-secondary" style="margin-top: var(--space-2);" onclick="goTo('select')">Select Players</button>
        </div>

      </div>
    </div>

  </main>

  <!-- ═══════════ START GAME BAR ═══════════ -->
  <div id="startBar">
    <div id="startBar-inner">
      <button id="startBtn" disabled onclick="doStartGame()">Start Game</button>
    </div>
  </div>

  <!-- ═══════════ SETTINGS DRAWER ═══════════ -->
  <div id="settings-overlay" role="dialog" aria-modal="true" aria-label="Settings"></div>
  <div id="settings-drawer">
    <div id="settings-header">
      <h2>Settings</h2>
      <button id="btn-close-settings" aria-label="Close settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="settings-body">

      <div class="setting-row">
        <div>
          <div class="setting-label">Light Mode</div>
          <div class="setting-sub">Switch to light theme</div>
        </div>
        <label class="toggle" aria-label="Toggle light mode">
          <input type="checkbox" id="toggle-light-mode" />
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="settings-divider"></div>

      <button id="btn-fullscreen" class="btn-secondary" style="width:100%; height:44px; font-size:13px;">
        Fullscreen Mode
      </button>

      <div class="settings-divider"></div>

      <button id="btn-reset-session" class="btn-danger-full">
        Clear All &amp; Reset
      </button>

    </div>
  </div>

</div><!-- #app -->

<!-- ═══════════ SCRIPT ═══════════ -->
<script>
  // ─────────── State ───────────
  let players  = [];
  let selected = new Set();
  let teams    = { a: [], b: [] };
  let teamsGenerated = false;

  // ─────────── Default squad (Lyngby HK U11 drenge) ───────────
  const DEFAULT_PLAYERS = [
    "Adian Kamenica","Aksel Strange","Alvin Breau","Anker Glahn",
    "Arn Grønbjerg Vej-Hansen","Aske Lysbjerg Havndrup","Benjamin Niclasen",
    "Bertram Boysen","Buster Brammer Boldt","Carl Krogh Samsøe",
    "Conrad Juul Coffari","Daniel Nazari","Demir Yigit","Edward Nielsen",
    "Ernst Munch-Petersen","Frederik Stegenborg","James Petersson",
    "Joachim Thinggaard","Kristian Pihl","Lucas Dønkjær",
    "Malthe Kruse Christiansen","Marcus Wiingaard Alstrup",
    "Marius Engly Anthonsen","Markus Torres Thani","Mathias Petersen",
    "Mihajlo Kruse Dimitrijevic","Nikolaj Lynge","Oscar Lund Costa",
    "Oscar Madsen Bjerre","Oscar Niemann","Storm Lui Dyg Staunæs",
    "Theo Friis Bach","Tobias Balslev Hansen","Victor Hørsted",
    "Viktor Bjørk Thorgrimsen","Walther Hodal","Witek Wojcik"
  ];

  // ─────────── Settings state ───────────
  let settings = { darkMode: true };

  function loadSettings() {
    try {
      const raw = localStorage.getItem('lu_settings');
      if (raw) settings = { ...settings, ...JSON.parse(raw) };
    } catch {}
  }
  function saveSettings() {
    localStorage.setItem('lu_settings', JSON.stringify(settings));
  }
  function applyTheme() {
    document.body.classList.toggle('theme-light', !settings.darkMode);
    const toggle = document.getElementById('toggle-light-mode');
    if (toggle) toggle.checked = !settings.darkMode;
  }

  // ─────────── Boot ───────────
  (function init() {
    loadSettings();
    applyTheme();
    const stored = localStorage.getItem('lu_players');
    players = stored ? JSON.parse(stored) : DEFAULT_PLAYERS.slice();
    if (!stored) save();
    renderRoster();
    renderSelect();
    if (players.length > 0) goTo('select');
  })();

  // ─────────── Persistence ───────────
  function save() {
    localStorage.setItem('lu_players', JSON.stringify(players));
  }

  // ─────────── Navigation ───────────
  function goTo(view) {
    ['roster', 'select', 'teams'].forEach(v => {
      document.getElementById(`view-${v}`).classList.toggle('active', v === view);
      document.getElementById(`tab-${v}`).classList.toggle('active', v === view);
    });
    document.getElementById('startBar').classList.toggle('visible', view === 'select');
    if (view === 'select') renderSelect();
  }

  // ─────────── Roster ───────────
  function renderRoster() {
    const list  = document.getElementById('rosterList');
    const empty = document.getElementById('rosterEmpty');
    document.getElementById('headerBadge').textContent =
      `${players.length} player${players.length !== 1 ? 's' : ''}`;

    if (players.length === 0) {
      list.innerHTML = '';
      empty.style.display = 'flex';
      return;
    }
    empty.style.display = 'none';

    list.innerHTML = players.map((name, i) => `
      <div class="player-card">
        <div class="player-card-accent"></div>
        <span class="player-bib">${initials(name)}</span>
        <span class="player-name">${esc(name)}</span>
        <button onclick="removePlayer(${i})" class="btn-icon danger" aria-label="Remove ${esc(name)}" style="margin-right: 4px;">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        </button>
      </div>
    `).join('');
  }

  document.getElementById('addForm').addEventListener('submit', e => {
    e.preventDefault();
    const input = document.getElementById('nameInput');
    const name  = input.value.trim();
    if (!name) return;

    if (players.some(p => p.toLowerCase() === name.toLowerCase())) {
      flashError(input);
      return;
    }

    players.push(name);
    save();
    renderRoster();
    input.value = '';
    input.focus();
  });

  function removePlayer(i) {
    const name = players[i];
    players.splice(i, 1);
    selected.delete(name);
    save();
    renderRoster();
    updateStartBtn();
  }

  // ─────────── Selection ───────────
  function renderSelect() {
    const grid  = document.getElementById('selectGrid');
    const empty = document.getElementById('selectEmpty');

    if (players.length === 0) {
      grid.style.display = 'none';
      empty.style.display = 'flex';
      updateStartBtn();
      return;
    }
    grid.style.display = '';
    empty.style.display = 'none';

    grid.innerHTML = players.map(name => {
      const on = selected.has(name);
      return `
        <button data-name="${esc(name)}" onclick="togglePlayer(this.dataset.name)"
          class="select-btn${on ? ' selected' : ''}">
          <span class="sel-initials">${initials(name)}</span>
          <span class="sel-name">${esc(name)}</span>
          ${on ? '<span class="sel-check">✓</span>' : ''}
        </button>
      `;
    }).join('');

    updateStartBtn();
  }

  function togglePlayer(name) {
    selected.has(name) ? selected.delete(name) : selected.add(name);
    renderSelect();
  }

  function doSelectAll() { players.forEach(p => selected.add(p)); renderSelect(); }
  function doClearAll()  { selected.clear(); renderSelect(); }

  function updateStartBtn() {
    const n   = selected.size;
    const btn = document.getElementById('startBtn');

    document.getElementById('selectInfo').textContent =
      n === 0 ? 'Tap players to mark them present' :
      n === 1 ? '1 player selected — need at least 2' :
                `${n} players selected`;

    btn.disabled = n < 2;
    btn.textContent = n >= 2 ? `Start Game  ·  ${n} players` : 'Start Game';

    if (n >= 2) btn.classList.add('glow');
    else        btn.classList.remove('glow');
  }

  // ─────────── Game Logic ───────────
  function doStartGame() {
    if (selected.size < 2) return;
    const pool = shuffle([...selected]);
    const half = Math.ceil(pool.length / 2);
    teams = { a: pool.slice(0, half), b: pool.slice(half) };
    teamsGenerated = true;
    renderTeams(true);
    goTo('teams');
  }

  function doReshuffle() {
    const pool = shuffle([...teams.a, ...teams.b]);
    const half = Math.ceil(pool.length / 2);
    teams = { a: pool.slice(0, half), b: pool.slice(half) };
    renderTeams(true);
  }

  function renderTeams(animate) {
    const total = teams.a.length + teams.b.length;

    document.getElementById('teamsEmpty').style.display   = 'none';
    document.getElementById('teamsHeader').style.display  = 'block';
    document.getElementById('teamsActions').style.display = 'flex';
    document.getElementById('teamsInfo').textContent =
      `${total} players · ${teams.a.length} vs ${teams.b.length}`;

    document.getElementById('teamsGrid').innerHTML = `
      <div id="zone-a" data-zone="a" class="team-zone${animate ? ' anim-a' : ''}">
        <div class="team-zone-header team-zone-header-a">
          <span class="team-zone-label">Team A</span>
          <span class="team-zone-count">${teams.a.length}</span>
        </div>
        <ul id="list-a" class="team-zone-list">
          ${teams.a.map((n, i) => playerItem(n, i, 'a')).join('')}
        </ul>
      </div>

      <div id="zone-b" data-zone="b" class="team-zone${animate ? ' anim-b' : ''}">
        <div class="team-zone-header team-zone-header-b">
          <span class="team-zone-label">Team B</span>
          <span class="team-zone-count">${teams.b.length}</span>
        </div>
        <ul id="list-b" class="team-zone-list">
          ${teams.b.map((n, i) => playerItem(n, i, 'b')).join('')}
        </ul>
      </div>
    `;

    bindDragListeners();
  }

  function playerItem(name, i, team) {
    return `
      <li class="player-item" data-name="${esc(name)}" data-team="${team}" draggable="true">
        <div class="pi-accent-${team}"></div>
        <span class="pi-handle">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <circle cx="5" cy="4" r="1.4"/><circle cx="11" cy="4" r="1.4"/>
            <circle cx="5" cy="8" r="1.4"/><circle cx="11" cy="8" r="1.4"/>
            <circle cx="5" cy="12" r="1.4"/><circle cx="11" cy="12" r="1.4"/>
          </svg>
        </span>
        <span class="pi-num">${i + 1}</span>
        <span class="pi-name">${esc(name)}</span>
      </li>
    `;
  }

  // ─────────── Drag & Drop ───────────
  let dnd = { name: null, from: null, ghost: null, sourceEl: null };

  function bindDragListeners() {
    document.querySelectorAll('.player-item').forEach(el => {
      el.addEventListener('dragstart', onDragStart);
      el.addEventListener('dragend',   onDragEnd);
    });
    ['a','b'].forEach(zone => {
      const z = document.getElementById(`zone-${zone}`);
      z.addEventListener('dragover',  e => onDragOver(e, zone));
      z.addEventListener('dragleave', e => onDragLeave(e, zone));
      z.addEventListener('drop',      e => onDrop(e, zone));
    });
    document.querySelectorAll('.player-item').forEach(el => {
      el.addEventListener('touchstart', onTouchStart, { passive: false });
      el.addEventListener('touchmove',  onTouchMove,  { passive: false });
      el.addEventListener('touchend',   onTouchEnd);
    });
  }

  /* Desktop */
  function onDragStart(e) {
    dnd.name     = e.currentTarget.dataset.name;
    dnd.from     = e.currentTarget.dataset.team;
    dnd.sourceEl = e.currentTarget;
    e.dataTransfer.effectAllowed = 'move';
    requestAnimationFrame(() => e.currentTarget.classList.add('dragging'));
  }
  function onDragEnd(e) {
    e.currentTarget.classList.remove('dragging');
    clearHighlights();
  }
  function onDragOver(e, zone) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (zone !== dnd.from) document.getElementById(`zone-${zone}`).classList.add('drag-over');
  }
  function onDragLeave(e, zone) {
    if (!e.currentTarget.contains(e.relatedTarget))
      document.getElementById(`zone-${zone}`).classList.remove('drag-over');
  }
  function onDrop(e, zone) {
    e.preventDefault();
    clearHighlights();
    if (zone === dnd.from || !dnd.name) return;
    movePlayer(dnd.name, dnd.from, zone);
  }

  /* Touch */
  function onTouchStart(e) {
    const li   = e.currentTarget;
    const rect = li.getBoundingClientRect();
    const t    = e.touches[0];
    dnd.name     = li.dataset.name;
    dnd.from     = li.dataset.team;
    dnd.sourceEl = li;
    dnd.offsetX  = t.clientX - rect.left;
    dnd.offsetY  = t.clientY - rect.top;
    const ghost = li.cloneNode(true);
    ghost.className = 'drag-ghost ' + li.className.replace('player-item','');
    ghost.style.width = rect.width + 'px';
    ghost.style.top   = (t.clientY - dnd.offsetY) + 'px';
    ghost.style.left  = (t.clientX - dnd.offsetX) + 'px';
    document.body.appendChild(ghost);
    dnd.ghost = ghost;
    li.classList.add('dragging');
    e.preventDefault();
  }
  function onTouchMove(e) {
    e.preventDefault();
    if (!dnd.ghost) return;
    const t = e.touches[0];
    dnd.ghost.style.top  = (t.clientY - dnd.offsetY) + 'px';
    dnd.ghost.style.left = (t.clientX - dnd.offsetX) + 'px';
    clearHighlights();
    dnd.ghost.style.display = 'none';
    const under = document.elementFromPoint(t.clientX, t.clientY);
    dnd.ghost.style.display = '';
    const zone = under?.closest('[data-zone]');
    if (zone && zone.dataset.zone !== dnd.from) zone.classList.add('drag-over');
  }
  function onTouchEnd(e) {
    if (!dnd.ghost) return;
    dnd.ghost.remove(); dnd.ghost = null;
    dnd.sourceEl?.classList.remove('dragging');
    const t = e.changedTouches[0];
    dnd.sourceEl.style.display = 'none';
    const under = document.elementFromPoint(t.clientX, t.clientY);
    dnd.sourceEl.style.display = '';
    const zone = under?.closest('[data-zone]');
    clearHighlights();
    if (zone && zone.dataset.zone !== dnd.from && dnd.name)
      movePlayer(dnd.name, dnd.from, zone.dataset.zone);
    dnd = { name: null, from: null, ghost: null, sourceEl: null };
  }

  function movePlayer(name, fromTeam, toTeam) {
    teams[fromTeam] = teams[fromTeam].filter(n => n !== name);
    teams[toTeam].push(name);
    renderTeams(false);
  }
  function clearHighlights() {
    document.getElementById('zone-a')?.classList.remove('drag-over');
    document.getElementById('zone-b')?.classList.remove('drag-over');
  }

  // ─────────── Utilities ───────────
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function initials(name) {
    return name.trim().split(/\s+/).map(w => w[0] || '').join('').toUpperCase().slice(0, 2) || '?';
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function flashError(input) {
    input.classList.add('error');
    input.select();
    setTimeout(() => input.classList.remove('error'), 1800);
  }

  // ─────────── Settings drawer ───────────
  (function wireSettings() {
    const overlay = document.getElementById('settings-overlay');
    const drawer  = document.getElementById('settings-drawer');
    const btnOpen = document.getElementById('btn-settings');
    const btnClose = document.getElementById('btn-close-settings');

    function open()  {
      overlay.classList.add('open');
      drawer.classList.add('open');
      btnClose.focus();
    }
    function close() {
      overlay.classList.remove('open');
      drawer.classList.remove('open');
      btnOpen.focus();
    }

    btnOpen.addEventListener('click', open);
    btnClose.addEventListener('click', close);
    overlay.addEventListener('click', close);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });

    // Light-mode toggle
    document.getElementById('toggle-light-mode').addEventListener('change', () => {
      settings.darkMode = !settings.darkMode;
      saveSettings();
      applyTheme();
    });

    // Fullscreen
    document.getElementById('btn-fullscreen').addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
      close();
    });

    // Clear All & Reset
    document.getElementById('btn-reset-session').addEventListener('click', () => {
      if (!confirm('Clear all players and reset? This cannot be undone.')) return;
      players = [];
      selected.clear();
      teams = { a: [], b: [] };
      teamsGenerated = false;
      save();
      renderRoster();
      renderSelect();
      goTo('roster');
      close();
    });

    // Sync the toggle after the DOM has this element
    applyTheme();
  })();
</script>
</body>
</html>
